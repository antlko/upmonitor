# upmonitor configuration — reference template.
#
# In normal use this file is managed for you through the UI (Resources /
# Settings), and lives in your config directory as `config.yaml`. You can also
# edit it by hand; it is validated and re-read whenever the app saves it.
# Full reference: docs/CONFIGURATION.md
#
# Copy this file to <config-dir>/config.yaml to start from a template.

version: 1

settings:
  default_widget_mode: name # icon | name | dashboard
  theme: dark # dark | light
  check:
    default_interval: 30 # seconds between checks (services may override)
    timeout: 10 # seconds before a check counts as failed
    retention_days: 30 # metrics history older than this is deleted

services:
  - id: grafana # slug; also the image filename and metrics key
    name: Grafana
    url: https://grafana.home.lab
    icon: grafana.webp # file under images/, optional
    check:
      interval: 30
      method: GET
      timeout: 10
      expected_status: [200] # empty ⇒ any 2xx counts as "online"
    widget:
      mode: dashboard # icon | name | dashboard
    chart:
      type: line # line | bars — how response-time history is drawn
    layout: { x: 0, y: 0, w: 3, h: 4 } # grid position + size
